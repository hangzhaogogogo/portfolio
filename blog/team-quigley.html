<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Team Quigley at Allegheny College">

  <title>Team Quigley | Hang Zhao</title>

  <!-- Favicon -->
  <link
    rel="shortcut icon"
    href="../assets/images/logo.ico"
    type="image/x-icon">

  <!-- Main website CSS -->
  <link
    rel="stylesheet"
    href="../assets/css/style.css">

  <!-- Google font -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    .blog-article-page {
      max-width: 900px;
      margin: 60px auto;
      padding: 30px;
    }

    .blog-article-card {
      background: var(--eerie-black-2, #1e1e1f);
      border: 1px solid var(--jet, #383838);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow-1);
    }

    .blog-article-title {
      margin-bottom: 10px;
    }

    .blog-article-meta {
      margin-bottom: 25px;
      color: var(--light-gray-70, #b8b8b8);
      font-size: 14px;
    }

    .blog-article-image {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 25px;
      display: block;
    }

    .blog-article-text {
      color: var(--light-gray, #d6d6d6);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--orange-yellow-crayola, #ffdb70);
      font-size: 15px;
      text-decoration: none;
    }

    .back-to-home:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .blog-article-page {
        margin: 20px auto;
        padding: 15px;
      }

      .blog-article-card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<main class="blog-article-page">

  <div class="blog-article-card">

    <header>
      <h1 class="h2 blog-article-title">Team Quigley</h1>

      <p class="blog-article-meta">
        Allegheny College · 2025
      </p>
    </header>

    <figure>
      <img
        class="blog-article-image"
        src="../assets/images/quigley.jpeg"
        alt="Team Quigley at Allegheny College">
    </figure>

    <section>
      <p class="blog-article-text">
        Photo added in 2025.
      </p>
    </section>

    <a class="back-to-home" href="../index.html">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Back to the main website
    </a>

  </div>

</main>

  <!-- Ionicons -->
  <script
    type="module"
    src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js">
  </script>

  <script
    nomodule
    src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js">
  </script>

</body>

</html>
