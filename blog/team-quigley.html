<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Team Quigley at Allegheny College">

  <title>Team Quigley | Hang Zhao</title>

  <!-- Favicon -->
  <link
    rel="shortcut icon"
    href="../assets/images/logo.ico"
    type="image/x-icon">

  <!-- Main website CSS -->
  <link
    rel="stylesheet"
    href="../assets/css/style.css">

  <!-- Google font -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    body{
        margin:0;
        padding:0;
        background:black;
        font-family:"Poppins",sans-serif;
    }

    .blog-article-page{
        max-width:1100px;
        margin:50px auto;
        padding:30px;
    }

    .blog-article-card{
        background:white;
        border-radius:25px;
        padding:50px;
        box-shadow:
        0 20px 60px rgba(0,0,0,.25);
    }

    .blog-article-title{
        color:black;
        margin-bottom:10px;
    }

    .blog-article-meta{
        color:#666;
        font-size:16px;
        margin-bottom:30px;
    }

    .blog-article-image{
        width:100%;
        display:block;
        border-radius:20px;
        margin-bottom:30px;
    }

    .blog-article-text{
        color:#222;
        font-size:18px;
        line-height:1.8;
        margin-bottom:40px;
    }

    .back-to-home{
        display:inline-flex;
        align-items:center;
        gap:8px;
        color:#ffb400;
        text-decoration:none;
        font-weight:600;
        font-size:17px;
    }

    .back-to-home:hover{
        text-decoration:underline;
    }

    @media(max-width:768px){
    .blog-article-page{
        margin:20px auto;
        padding:15px;
    }

    .blog-article-card{
        padding:25px;
    }

    .blog-article-title{
        font-size:32px;
    }
    }
    </style>
</head>

<body>

<main class="blog-article-page">

  <div class="blog-article-card">

    <header>
      <h1 class="h2 blog-article-title">Team Quigley</h1>

      <p class="blog-article-meta">
        Allegheny College · 2025
      </p>
    </header>

    <figure>
      <img
        class="blog-article-image"
        src="../assets/images/quigley.jpeg"
        alt="Team Quigley at Allegheny College">
    </figure>

    <section>
      <p class="blog-article-text">
        Photo added in 2025.
      </p>
    </section>

    <a class="back-to-home" href="../index.html">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Back to the main website
    </a>

  </div>

</main>

  <!-- Ionicons -->
  <script
    type="module"
    src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js">
  </script>

  <script
    nomodule
    src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js">
  </script>

</body>

</html>
